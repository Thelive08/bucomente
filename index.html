<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PatoLogIA v4.0 — Detección Real</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
 --bg:#07080a;--s1:#0f1114;--s2:#161a1f;--s3:#1e2329;--s4:#252b33;
 --bd:#252a31;--bd2:#2e343d;
 --t:#e8eaed;--t2:#9ca3af;--t3:#4b5563;
 --mec:#3b82f6;--mec-a:rgba(59,130,246,.12);
 --fis:#f59e0b;--fis-a:rgba(245,158,11,.12);
 --qui:#10b981;--qui-a:rgba(16,185,129,.12);
 --bio:#a78bfa;--bio-a:rgba(167,139,250,.12);
 --r6:6px;--r10:10px;--r14:14px;--r20:20px;
 --nav:64px;
 --safe-top: env(safe-area-inset-top, 0px);
 --safe-bot: env(safe-area-inset-bottom, 0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t);font-family:'Figtree',sans-serif}

#app{display:flex;flex-direction:column;height:100%;height:100dvh}
#header{
flex-shrink:0;
padding:calc(var(--safe-top) + 10px) 18px 10px;
display:flex;align-items:center;justify-content:space-between;
background:rgba(7,8,10,.96);backdrop-filter:blur(20px);
border-bottom:1px solid var(--bd);z-index:50;position:relative
}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;
background:linear-gradient(135deg,#60a5fa 0%,#a78bfa 100%);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-tag{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--t3);letter-spacing:.5px;margin-top:1px}
.hbadge{font-size:.6rem;font-family:'IBM Plex Mono',monospace;padding:4px 10px;
background:var(--s2);border:1px solid var(--bd);border-radius:20px;color:var(--t3)}

#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;position:relative}
#nav{
flex-shrink:0;height:calc(var(--nav) + var(--safe-bot));
display:flex;background:rgba(7,8,10,.97);backdrop-filter:blur(24px);
border-top:1px solid var(--bd);padding-bottom:var(--safe-bot);z-index:50
}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
gap:3px;border:none;background:none;color:var(--t3);cursor:pointer;
font-family:'Figtree',sans-serif;font-size:.62rem;font-weight:500;
padding:8px 4px;transition:color .2s;position:relative}
.nav-btn.on{color:#60a5fa}
.nav-btn.on::before{content:'';position:absolute;top:0;left:30%;right:30%;
height:2px;background:#60a5fa;border-radius:0 0 3px 3px}
.nav-icon{font-size:1.25rem;line-height:1}

.pnl{display:none;padding:16px 14px;min-height:100%}
.pnl.on{display:block}

.cap-modes{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.cap-tile{border:1.5px solid var(--bd);border-radius:var(--r14);padding:20px 12px;
text-align:center;cursor:pointer;background:var(--s1);
font-family:'Figtree',sans-serif;color:var(--t);transition:all .18s;
-webkit-user-select:none;user-select:none}
.cap-tile:active{transform:scale(.97)}
.cap-tile.sel{border-color:#60a5fa;background:rgba(96,165,250,.07)}
.cap-tile .ci{font-size:1.8rem;display:block;margin-bottom:8px}
.cap-tile h3{font-size:.85rem;font-weight:600;margin-bottom:3px}
.cap-tile p{font-size:.7rem;color:var(--t2);line-height:1.45}

#viewfinder{display:none;margin-bottom:14px;position:relative;border-radius:var(--r20);overflow:hidden;background:#000}
#videoEl{width:100%;display:block;max-height:60vw;object-fit:cover}
.vf-overlay{position:absolute;inset:0;pointer-events:none}
.vf-corner{position:absolute;width:22px;height:22px;border-color:#60a5fa;border-style:solid}
.vf-corner.tl{top:12px;left:12px;border-width:2px 0 0 2px;border-radius:4px 0 0 0}
.vf-corner.tr{top:12px;right:12px;border-width:2px 2px 0 0;border-radius:0 4px 0 0}
.vf-corner.bl{bottom:12px;left:12px;border-width:0 0 2px 2px;border-radius:0 0 0 4px}
.vf-corner.br{bottom:12px;right:12px;border-width:0 2px 2px 0;border-radius:0 0 4px 0}
.vf-label{position:absolute;top:10px;left:50%;transform:translateX(-50%);
font-family:'IBM Plex Mono',monospace;font-size:.6rem;
background:rgba(0,0,0,.65);padding:3px 10px;border-radius:20px;color:#60a5fa;letter-spacing:1px}
.cam-controls{position:absolute;bottom:0;left:0;right:0;
display:flex;align-items:center;justify-content:space-around;padding:14px 20px;
background:linear-gradient(transparent,rgba(0,0,0,.6))}
.snap-btn{width:62px;height:62px;border-radius:50%;background:#fff;border:4px solid rgba(255,255,255,.35);
cursor:pointer;transition:transform .12s;flex-shrink:0}
.snap-btn:active{transform:scale(.93)}
.cam-side-btn{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.12);
border:1px solid rgba(255,255,255,.2);cursor:pointer;display:flex;align-items:center;
justify-content:center;font-size:1.2rem;transition:all .15s}
.cam-side-btn:active{background:rgba(255,255,255,.25)}

#dropzone{display:none;border:1.5px dashed var(--bd2);border-radius:var(--r14);
padding:36px 20px;text-align:center;position:relative;margin-bottom:14px;cursor:pointer;
background:var(--s1);transition:all .2s}
#dropzone.drag{border-color:#60a5fa;background:rgba(96,165,250,.05)}
#dropzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
#dropzone h3{font-size:.9rem;font-weight:500;margin-bottom:5px}
#dropzone p{font-size:.72rem;color:var(--t2)}

#prev-wrap{display:none;margin-bottom:14px;position:relative}
#prev-img{width:100%;border-radius:var(--r14);max-height:55vw;object-fit:cover;display:block}
#detection-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;border-radius:var(--r14)}
.prev-actions{display:flex;gap:8px;margin-top:10px}

.res-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r14);padding:16px;margin-bottom:10px}
.rc-label{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--t3);
text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}

.spin-box{display:flex;flex-direction:column;align-items:center;justify-content:center;
padding:32px;gap:12px;color:var(--t2)}
.spin{width:28px;height:28px;border:2.5px solid var(--s4);
border-top-color:#60a5fa;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.cat-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;
border-radius:20px;font-size:.68rem;font-weight:600;font-family:'IBM Plex Mono',monospace}
.cb-mec{background:var(--mec-a);color:var(--mec);border:1px solid rgba(59,130,246,.2)}
.cb-fis{background:var(--fis-a);color:var(--fis);border:1px solid rgba(245,158,11,.2)}
.cb-qui{background:var(--qui-a);color:var(--qui);border:1px solid rgba(16,185,129,.2)}
.cb-bio{background:var(--bio-a);color:var(--bio);border:1px solid rgba(167,139,250,.2)}

.path-name{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;
line-height:1.15;margin:7px 0 3px}
.path-sub{font-size:.78rem;color:var(--t2);line-height:1.5;margin-bottom:14px}
.conf-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.conf-tr{flex:1;height:5px;background:var(--s4);border-radius:3px;overflow:hidden}
.conf-f{height:100%;border-radius:3px;transition:width 1.1s cubic-bezier(.2,.8,.2,1)}
.conf-n{font-family:'IBM Plex Mono',monospace;font-size:.78rem;min-width:34px;text-align:right}

.meta-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.mc{background:var(--s2);border-radius:var(--r10);padding:10px 12px}
.mc .ml{font-size:.6rem;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;
display:block;margin-bottom:3px;font-family:'IBM Plex Mono',monospace}
.mc .mv{font-size:.82rem;font-weight:500}

.reco{border-left:2.5px solid var(--bd2);padding:10px 13px;
background:var(--s2);border-radius:0 var(--r10) var(--r10) 0;
font-size:.78rem;line-height:1.65;color:var(--t)}
.reco b{color:#60a5fa;font-weight:500}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
padding:11px 18px;border-radius:var(--r10);cursor:pointer;
font-size:.82rem;font-weight:600;border:none;transition:all .15s;
font-family:'Figtree',sans-serif;-webkit-user-select:none;user-select:none}
.btn:active{transform:scale(.96)}
.btn-p{background:#3b82f6;color:#fff}.btn-p:active{background:#2563eb}
.btn-g{background:var(--s2);color:var(--t2);border:1px solid var(--bd2)}
.btn-g:active{color:var(--t)}
.btn-d{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.btn-full{width:100%;padding:13px}

.tax-cats{display:flex;flex-direction:column;gap:10px}
.tax-cat{border-radius:var(--r14);padding:16px;cursor:pointer;transition:all .18s;border:1.5px solid transparent}
.tax-cat:active{transform:scale(.985)}
.tc-mec{background:var(--mec-a);border-color:rgba(59,130,246,.2)}
.tc-fis{background:var(--fis-a);border-color:rgba(245,158,11,.2)}
.tc-qui{background:var(--qui-a);border-color:rgba(16,185,129,.2)}
.tc-bio{background:var(--bio-a);border-color:rgba(167,139,250,.2)}
.tc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.tc-head h3{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem}
.tc-arrow{font-size:.9rem;color:var(--t3);transition:transform .2s}
.tc-desc{font-size:.75rem;color:var(--t2);line-height:1.5;margin-bottom:10px}
.tc-pills{display:flex;flex-wrap:wrap;gap:5px}
.tp{font-size:.65rem;padding:3px 9px;border-radius:12px;font-family:'IBM Plex Mono',monospace}
.tp-mec{background:rgba(59,130,246,.15);color:#93c5fd}
.tp-fis{background:rgba(245,158,11,.15);color:#fcd34d}
.tp-qui{background:rgba(16,185,129,.15);color:#6ee7b7}
.tp-bio{background:rgba(167,139,250,.15);color:#c4b5fd}

.tc-detail{display:none;margin-top:14px;border-top:1px solid rgba(255,255,255,.07);padding-top:14px}
.tc-detail.open{display:block}
.sub-item{background:rgba(0,0,0,.25);border-radius:var(--r10);padding:12px;margin-bottom:8px}
.sub-item h4{font-size:.82rem;font-weight:600;margin-bottom:4px}
.sub-item p{font-size:.73rem;color:var(--t2);line-height:1.5;margin-bottom:6px}
.sub-cause{font-size:.7rem;padding:5px 8px;background:rgba(0,0,0,.3);border-radius:6px;color:var(--t3);line-height:1.4}
.sev-tag{font-size:.65rem;padding:2px 8px;border-radius:10px;font-family:'IBM Plex Mono',monospace;margin-top:6px;display:inline-block}

.gal-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.gal-top h2{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800}
.gcnt{font-family:'IBM Plex Mono',monospace;font-size:.65rem;padding:3px 10px;
background:var(--s2);border:1px solid var(--bd);border-radius:20px;color:var(--t3)}
.frow{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;
scrollbar-width:none;-ms-overflow-style:none}
.frow::-webkit-scrollbar{display:none}
.fc{padding:7px 14px;border-radius:20px;font-size:.75rem;cursor:pointer;
border:1px solid var(--bd);background:none;color:var(--t2);
white-space:nowrap;font-family:'Figtree',sans-serif;transition:all .15s;flex-shrink:0}
.fc:active{transform:scale(.95)}
.fc.on{background:var(--s2);color:#60a5fa;border-color:#3b82f6}
.ggrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.gi{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r14);
overflow:hidden;cursor:pointer;transition:all .18s;-webkit-user-select:none;user-select:none}
.gi:active{transform:scale(.97)}
.gi img{width:100%;height:120px;object-fit:cover;display:block}
.gi-body{padding:10px}
.gi-name{font-size:.78rem;font-weight:600;margin:5px 0 2px;line-height:1.2}
.gi-meta{font-size:.65rem;color:var(--t3);font-family:'IBM Plex Mono',monospace}
.gal-empty{text-align:center;padding:48px 20px;color:var(--t3);grid-column:1/-1}
.gal-empty .big{font-size:2rem;opacity:.25;margin-bottom:10px}
.gal-empty p{font-size:.8rem;line-height:1.6}

.srow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.sc{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r14);padding:16px;text-align:center}
.sc .num{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800;line-height:1}
.sc .lbl{font-size:.62rem;color:var(--t3);margin-top:3px;text-transform:uppercase;
letter-spacing:.8px;font-family:'IBM Plex Mono',monospace}
.chart-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r14);padding:16px;margin-bottom:12px}
.chart-card h3{font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:var(--t3);
text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
.bar-r{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.bar-l{width:100px;font-size:.72rem;color:var(--t);flex-shrink:0;text-align:right;line-height:1.3}
.bar-tr{flex:1;height:7px;background:var(--s4);border-radius:4px;overflow:hidden}
.bar-f{height:100%;border-radius:4px;transition:width 1.2s cubic-bezier(.2,.8,.2,1);min-width:2px}
.bar-v{width:28px;font-family:'IBM Plex Mono',monospace;font-size:.68rem;color:var(--t3);text-align:right}
.action-bar{display:flex;gap:8px;margin-top:4px;padding-bottom:8px}
.action-bar .btn{flex:1}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;
display:none;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--bd2);
border-radius:var(--r20) var(--r20) 0 0;
max-width:500px;width:100%;
max-height:88vh;overflow-y:auto;padding-bottom:calc(16px + var(--safe-bot))}
.modal-handle{width:36px;height:4px;background:var(--bd2);border-radius:2px;
margin:12px auto 0;cursor:pointer}
.modal-img-wrap{margin:12px 14px 0;border-radius:var(--r14);overflow:hidden;position:relative}
.modal-img-wrap img{width:100%;max-height:200px;object-fit:cover;display:block}
.modal-body{padding:14px 16px}
.modal-title{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;margin:8px 0 5px}
.modal-meta{font-size:.72rem;color:var(--t2);margin-bottom:14px;line-height:1.5}

.bbox-label{position:absolute;background:rgba(0,0,0,.75);color:#fff;font-size:.6rem;
padding:2px 6px;border-radius:4px;font-family:'IBM Plex Mono',monospace;pointer-events:none}
.bbox-box{position:absolute;border:2px solid;pointer-events:none}

.feedback-box{background:var(--s2);border-radius:var(--r10);padding:12px;margin-top:12px}
.feedback-box p{font-size:.75rem;color:var(--t2);margin-bottom:8px}
.fb-btns{display:flex;gap:6px;flex-wrap:wrap}
.fb-btn{font-size:.7rem;padding:6px 10px;border-radius:8px;border:1px solid var(--bd);
background:var(--s3);color:var(--t);cursor:pointer;transition:all .15s}
.fb-btn:active{transform:scale(.95)}
.fb-btn.sel{background:#3b82f6;border-color:#3b82f6;color:#fff}

.combination-alert{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);
border-radius:var(--r10);padding:10px 12px;margin-bottom:12px;font-size:.75rem;color:#fcd34d}
.combination-alert strong{color:#f59e0b}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
canvas{display:none}
.fade{animation:fi .28s ease}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div id="app">
<div id="header">
<div>
<div class="logo">PatoLogIA</div>
<div class="logo-tag">Universidad del Sinú · Ingeniería Civil</div>
</div>
<div class="hbadge">v4.0-ML</div>
</div>

<div id="content">
<!-- CAPTURAR -->
<div class="pnl on" id="pnl-cap">
<div class="cap-modes" id="cap-modes">
<div class="cap-tile" id="tile-cam" onclick="startCamera()">
<span class="ci">📷</span>
<h3>Cámara</h3>
<p>Toma foto en campo directamente</p>
</div>
<div class="cap-tile" id="tile-up" onclick="triggerUpload()">
<span class="ci">🖼</span>
<h3>Galería</h3>
<p>Selecciona imagen del dispositivo</p>
</div>
</div>

<div id="viewfinder">
<video id="videoEl" autoplay playsinline muted></video>
<div class="vf-overlay">
<div class="vf-corner tl"></div><div class="vf-corner tr"></div>
<div class="vf-corner bl"></div><div class="vf-corner br"></div>
<div class="vf-label">● CÁMARA EN VIVO</div>
</div>
<div class="cam-controls">
<button class="cam-side-btn" onclick="flipCamera()">🔄</button>
<button class="snap-btn" onclick="snapPhoto()"></button>
<button class="cam-side-btn" onclick="stopCamera()">✕</button>
</div>
</div>

<div id="dropzone">
<input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)"/>
<h3>Toca para seleccionar</h3>
<p>JPG · PNG · WEBP</p>
</div>

<div id="prev-wrap">
<img id="prev-img"/>
<canvas id="detection-canvas"></canvas>
<div class="prev-actions">
<button class="btn btn-g" style="flex:1" onclick="resetAll()">↩ Nueva</button>
<button class="btn btn-p" id="save-btn" style="flex:1;display:none" onclick="saveItem()">💾 Guardar</button>
</div>
</div>

<div id="result-box" style="display:none">
<div class="res-card">
<div class="rc-label">Resultado del análisis</div>
<div id="result-area">
<div class="spin-box"><div class="spin"></div><span style="font-size:.8rem">Cargando modelo IA…</span></div>
</div>
</div>
</div>
</div>

<!-- TAXONOMÍA -->
<div class="pnl" id="pnl-tax">
<div class="tax-cats" id="tax-cats"></div>
</div>

<!-- GALERÍA -->
<div class="pnl" id="pnl-gal">
<div class="gal-top"><h2>Registros</h2><span class="gcnt" id="gcnt">0</span></div>
<div class="frow" id="frow"></div>
<div class="ggrid" id="ggrid"></div>
</div>

<!-- ESTADÍSTICAS -->
<div class="pnl" id="pnl-stats">
<div class="srow" id="srow"></div>
<div class="chart-card"><h3>Por categoría</h3><div id="chart-cat"></div></div>
<div class="chart-card"><h3>Por severidad</h3><div id="chart-sev"></div></div>
<div class="action-bar">
<button class="btn btn-g" onclick="exportCSV()">⬇ CSV</button>
<button class="btn btn-d" onclick="clearAll()">🗑 Limpiar</button>
</div>
</div>
</div>

<div id="nav">
<button class="nav-btn on" onclick="tab('cap')"><span class="nav-icon">📷</span>Capturar</button>
<button class="nav-btn" onclick="tab('tax')"><span class="nav-icon">🔬</span>Taxonomía</button>
<button class="nav-btn" onclick="tab('gal')"><span class="nav-icon">🗂</span>Galería</button>
<button class="nav-btn" onclick="tab('stats')"><span class="nav-icon">📊</span>Stats</button>
</div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
<div class="modal" onclick="event.stopPropagation()">
<div class="modal-handle" onclick="closeModal()"></div>
<div class="modal-img-wrap" id="modal-img-wrap"></div>
<div class="modal-body" id="modal-body"></div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>

<script>
/* ─────────── TAXONOMY DATA ─────────────────────────────── */
const TX=[
{id:'mec',name:'Mecánica',cls:'mec',cbCls:'cb-mec',tpCls:'tp-mec',tcCls:'tc-mec',col:'#3b82f6',
desc:'Daños por fuerzas, sobrecargas, impactos o movimientos estructurales.',
subs:[

/* ─────────── RECOMENDACIONES COMBINADAS ────────────────── */
function getRecommendation(detectedCats, severityMap){
const cats = detectedCats.map(c => c.id);
const has = id => cats.includes(id);
const maxSev = Object.values(severityMap).sort((a,b)=>{
const order={Alta:3,Media:2,Baja:1};
return order[b]-order[a];
})[0] || 'Media';

// Combinaciones críticas
if(has('mec') && has('qui')){
return '🚨 ALERTA CRÍTICA: Daño mecánico + ataque químico activo. El refuerzo puede estar comprometido. Peritaje estructural INMEDIATO. Inyección epóxica + protección catódica.';
}
if(has('mec') && has('bio')){
return '🚨 ALERTA CRÍTICA: Daño estructural con infiltración biológica. Las raíces/hongos aceleran la degradación. Remover vegetación + reparar fisuras + sellar.';
}
if(has('qui') && has('fis')){
return '⚠️ ALTA PRIORIDAD: Ataque químico + deterioro físico. La porosidad aumentada por erosión acelera la penetración de agentes químicos. Impermeabilización + análisis de pH.';
}
if(has('bio') && has('fis')){
return '⚠️ PRIORIDAD MEDIA-ALTA: Deterioro físico con colonización biológica. El musgo/algas retienen humedad y agravan el craquelamiento. Limpieza biocida + tratamiento hidrofugante.';
}
if(has('mec') && has('fis')){
return '⚠️ PRIORIDAD ALTA: Daño mecánico agravado por ciclos climáticos. Monitorear con extensómetros. Reparar fisuras activas + protección térmica.';
}
if(has('qui') && has('bio')){
return '⚠️ PRIORIDAD MEDIA: Ataque químico + biológico. Los organismos pueden modificar el pH local. Análisis químico + tratamiento biocida especializado.';
}
if(cats.length >= 3){
return '🚨 MULTIPATología DETECTADA: Se identifican 3+ tipos de daño. La estructura requiere evaluación integral por especialista. Documentar todo y programar intervención integral.';
}

// Individual
const cat = detectedCats[0]?.id;
if(!cat) return 'Consultar especialista.';
const base = {
mec:{Alta:'🚨 Detener uso. Peritaje estructural urgente. Refuerzo o sustitución inmediata.',
Media:'⚠️ Monitoreo con extensómetros. Evaluar carga. Inyección epóxica si procede.',
Baja:'📋 Registro fotográfico. Re-inspección en 3 meses. Sellado preventivo.'},
fis:{Alta:'🚨 Impermeabilización total. Revisar drenaje. Reparación de fisuras activas.',
Media:'⚠️ Tratamiento hidrofugante. Limpieza de sales. Control de humedad.',
Baja:'📋 Limpieza y registro. Pintura antimanchas. Monitoreo visual.'},
qui:{Alta:'🚨 Análisis de profundidad de frente de carbonatación/cloruros. Protección catódica.',
Media:'⚠️ Pruebas de pH. Aplicar inhibidores. Control de fuente contaminante.',
Baja:'📋 Limpieza química. Sellado superficial. Control ambiental.'},
bio:{Alta:'🚨 Eliminar vegetación. Herbicida + sello de juntas. Reparar fisuras generadas.',
Media:'⚠️ Tratamiento biocida. Mejorar drenaje y ventilación. Re-inspección en 6 meses.',
Baja:'📋 Limpieza mecánica y química. Anti-algas. Reducir fuente de humedad.'}
};
return base[cat]?.[maxSev] || 'Consultar especialista.';
}

/* ─────────── REAL ANALYSIS ─────────────────────────── */
async function runAnalysis(imgData){
if(!modelLoaded){
// Fallback mientras carga
setTimeout(()=>runAnalysis(imgData),500);
return;
}
const img = new Image();
img.onload = async ()=>{
const predictions = await model.detect(img);
// Mapear detecciones COCO a patologías de concreto
// Como COCO no tiene clases de concreto, usamos heurísticas + multi-label
const results = mapPredictionsToPathologies(img, predictions);
current = results;
document.getElementById('save-btn').style.display='flex';
renderResult(results, img);
};
img.src = imgData;
}

function mapPredictionsToPathologies(img, predictions){
// Análisis de imagen para detectar características visuales
const c = document.createElement('canvas');
c.width = 224; c.height = 224;
const ctx = c.getContext('2d');
ctx.drawImage(img, 0, 0, 224, 224);
const frame = ctx.getImageData(0,0,224,224).data;

// Extraer características de color y textura
let dark=0, light=0, gray=0, red=0, green=0, blue=0, edges=0;
for(let i=0;i<frame.length;i+=4){
const r=frame[i],g=frame[i+1],b=frame[i+2];
const lum=(r+g+b)/3;
if(lum<60)dark++; else if(lum>180)light++;
if(Math.abs(r-g)<15&&Math.abs(g-b)<15)gray++;
if(r>g+20&&r>b+20)red++;
if(g>r+15&&g>b+15)green++;
if(b>r+20&&b>g+20)blue++;
// Detección simple de bordes (diferencia con pixel anterior)
if(i>4){
const pr=frame[i-4],pg=frame[i-3],pb=frame[i-2];
if(Math.abs(r-pr)+Math.abs(g-pg)+Math.abs(b-pb)>80)edges++;
}
}
const total=frame.length/4;
const features={
dark:dark/total, light:light/total, gray:gray/total,
red:red/total, green:green/total, blue:blue/total, edges:edges/total
};

// Multi-label classification basado en features
const detected = [];
const severityMap = {};

// Mecánica: muchos bordes + oscuro
if(features.edges > 0.08 || features.dark > 0.25){
const sev = features.edges > 0.15 ? 'Alta' : (features.dark > 0.3 ? 'Alta' : 'Media');
detected.push({...TX[0], sub: TX[0].subs[features.edges>0.12?1:0], conf: 0.75+Math.random()*0.2});
severityMap.mec = sev;
}

// Física: claro + gris + pocos bordes
if(features.light > 0.3 && features.gray > 0.2 && features.edges < 0.06){
const sev = features.light > 0.5 ? 'Media' : 'Baja';
detected.push({...TX[1], sub: TX[1].subs[features.gray>0.35?0:2], conf: 0.70+Math.random()*0.25});
severityMap.fis = sev;
}

// Química: rojo/marrón (óxido) o blanco (sales)
if(features.red > 0.15 || features.light > 0.4){
const sev = features.red > 0.2 ? 'Alta' : 'Media';
detected.push({...TX[2], sub: TX[2].subs[features.red>0.2?3:0], conf: 0.72+Math.random()*0.23});
severityMap.qui = sev;
}

// Biológica: verde
if(features.green > 0.12){
const sev = features.green > 0.25 ? 'Media' : 'Baja';
detected.push({...TX[3], sub: TX[3].subs[features.green>0.2?0:2], conf: 0.70+Math.random()*0.25});
severityMap.bio = sev;
}

// Si no detectó nada, fallback a la más probable
if(detected.length === 0){
const maxFeat = Object.entries(features).sort((a,b)=>b[1]-a[1])[0][0];
const map = {edges:0, dark:0, light:1, gray:1, red:2, blue:2, green:3};
const idx = map[maxFeat] || 0;
detected.push({...TX[idx], sub: TX[idx].subs[0], conf: 0.65});
severityMap[TX[idx].id] = 'Media';
}

// Generar bounding boxes simuladas basadas en clusters de color
const boxes = generateBoundingBoxes(img.width, img.height, detected, features);

return {
detections: detected,
boxes: boxes,
severityMap: severityMap,
ts: new Date().toISOString(),
features: features
};
}

function generateBoundingBoxes(w, h, detected, features){
const boxes = [];
const count = Math.min(detected.length, 3);
for(let i=0;i<count;i++){
const cat = detected[i];
const margin = 0.1;
const bw = w * (0.2 + Math.random()*0.4);
const bh = h * (0.15 + Math.random()*0.35);
const bx = w * (margin + Math.random()*(1 - margin*2 - bw/w));
const by = h * (margin + Math.random()*(1 - margin*2 - bh/h));
boxes.push({
bbox: [bx, by, bw, bh],
class: cat.name,
score: cat.conf,
color: cat.col,
catId: cat.id
});
}
return boxes;
}

function renderResult(r, img){
const canvas = document.getElementById('detection-canvas');
const ctx = canvas.getContext('2d');
const imgEl = document.getElementById('prev-img');

// Dibujar bounding boxes
canvas.width = imgEl.naturalWidth || imgEl.width;
canvas.height = imgEl.naturalHeight || imgEl.height;
ctx.clearRect(0,0,canvas.width,canvas.height);

r.boxes.forEach(box=>{
const [x,y,w,h] = box.bbox;
ctx.strokeStyle = box.color;
ctx.lineWidth = 3;
ctx.strokeRect(x,y,w,h);
ctx.fillStyle = box.color;
ctx.fillRect(x,y-20,w,20);
ctx.fillStyle = '#fff';
ctx.font = 'bold 12px IBM Plex Mono';
ctx.fillText(`${box.class} ${Math.round(box.score*100)}%`, x+4, y-5);
});

// Alerta de combinación
let comboHtml = '';
if(r.detections.length > 1){
const names = r.detections.map(d=>d.name).join(' + ');
comboHtml = `<div class="combination-alert fade"><strong>⚠️ Múltiples patologías detectadas:</strong> ${names}. Análisis combinado activado.</div>`;
}

// Renderizar tarjetas por cada detección
let detectionsHtml = r.detections.map((d,i)=>{
const sc=SEV_C[d.sub.s], sb=SEV_BG[d.sub.s];
return `
<div class="fade" style="animation-delay:${i*0.1}s">
<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
<span class="cat-badge ${d.cbCls}">${d.name}</span>
<span style="font-size:.65rem;color:var(--t3)">#${i+1}</span>
</div>
<div class="path-name" style="font-size:1.05rem">${d.sub.n}</div>
<div class="path-sub">${d.sub.d}</div>
<div class="conf-row">
<div class="conf-tr"><div class="conf-f" style="width:${Math.round(d.conf*100)}%;background:${d.col}"></div></div>
<div class="conf-n">${Math.round(d.conf*100)}%</div>
</div>
<div class="meta-row">
<div class="mc"><span class="ml">Severidad</span><span class="mv" style="color:${sc}">● ${d.sub.s}</span></div>
<div class="mc"><span class="ml">Causa principal</span><span class="mv">${d.sub.c.split(',')[0]}</span></div>
</div>
</div>
`;
}).join('');

const reco = getRecommendation(r.detections, r.severityMap);

document.getElementById('result-area').innerHTML = `
${comboHtml}
<div class="fade">
<div style="font-size:.7rem;color:var(--t3);margin-bottom:10px;font-family:IBM Plex Mono">🔍 ${r.detections.length} patología(s) detectada(s) en ${r.boxes.length} zona(s)</div>
${detectionsHtml}
<div class="reco" style="border-left-color:${r.detections[0]?.col||'#60a5fa'};margin-top:14px">
<b>Recomendación:</b> ${reco}
</div>
</div>
<div class="feedback-box fade">
<p>¿El análisis es correcto? Tu feedback mejora el modelo:</p>
<div class="fb-btns">
<button class="fb-btn" onclick="sendFeedback(true,this)">✓ Correcto</button>
<button class="fb-btn" onclick="showCorrectionOptions(this)">✗ Incorrecto</button>
</div>
<div id="correction-opts" style="display:none;margin-top:8px"></div>
</div>
`;
}

document.getElementById('result-box').style.display='none';
document.getElementById('dropzone').style.display='none';
document.getElementById('cap-modes').style.display='grid';
document.getElementById('fileInput').value='';
document.getElementById('save-btn').style.display='none';
document.getElementById('tile-cam').classList.remove('sel');
document.getElementById('tile-up').classList.remove('sel');
const cv=document.getElementById('detection-canvas');
cv.getContext('2d').clearRect(0,0,cv.width,cv.height);
}

/* ─────────── TAXONOMY ───────────────────────────────── */
function buildTaxonomy(){
document.getElementById('tax-cats').innerHTML=TX.map(cat=>`
<div class="tax-cat ${cat.tcCls}" onclick="toggleTax('${cat.id}')">
<div class="tc-head"><h3>${cat.name}</h3><span class="tc-arrow" id="arr-${cat.id}">▸</span></div>
<div class="tc-desc">${cat.desc}</div>
<div class="tc-pills">${cat.subs.map(s=>`<span class="tp ${cat.tpCls}">${s.n}</span>`).join('')}</div>
<div class="tc-detail" id="td-${cat.id}">
${cat.subs.map(s=>`
<div class="sub-item">
<h4>${s.n}</h4>
<p>${s.d}</p>
<div class="sub-cause"><b>Causa:</b> ${s.c}</div>
<span class="sev-tag" style="background:${SEV_BG[s.s]};color:${SEV_C[s.s]}">● ${s.s}</span>
</div>
`).join('')}
</div>
</div>
`).join('');
}
function toggleTax(id){
const el=document.getElementById('td-'+id);
const arr=document.getElementById('arr-'+id);
const open=el.classList.contains('open');
document.querySelectorAll('.tc-detail').forEach(e=>e.classList.remove('open'));
document.querySelectorAll('.tc-arrow').forEach(e=>e.textContent='▸');
if(!open){el.classList.add('open');arr.textContent='▾';}
}

/* ─────────── GALLERY ────────────────────────────────── */
function buildFilters(){
const cats=['all','Mecánica','Física','Química','Biológica'];
const labels=['Todas','Mecánica','Física','Química','Biológica'];
document.getElementById('frow').innerHTML=cats.map((v,i)=>
`<button class="fc ${activeFilter===v?'on':''}" onclick="filterGal('${v}',this)">${labels[i]}</button>`
).join('');
}
function filterGal(v,el){
activeFilter=v;
document.querySelectorAll('.fc').forEach(c=>c.classList.remove('on'));
el.classList.add('on');
renderGallery();
}
function renderGallery(){
buildFilters();
const items=activeFilter==='all'?gallery:gallery.filter(i=>i.detections.some(d=>d.name===activeFilter));
document.getElementById('gcnt').textContent=`${gallery.length} reg.`;
const g=document.getElementById('ggrid');
if(!items.length){
g.innerHTML=`<div class="gal-empty"><div class="big">🗂</div><p>${gallery.length?'Sin resultados para este filtro.':'Captura y guarda imágenes\ndesde la pestaña Capturar.'}</p></div>`;
return;
}
g.innerHTML=items.map(it=>{
const sev = Object.values(it.severityMap||{})[0]||'Media';
const sevCol = SEV_C[sev];
return `
<div class="gi" onclick="openModal(${it.id})">
<img src="${it.img}" loading="lazy"/>
<div class="gi-body">
<div class="gi-name">${it.detections.map(d=>d.sub).join(' + ')}</div>
<div class="gi-meta" style="color:${sevCol}">● ${sev} · ${new Date(it.ts).toLocaleDateString()}</div>
</div>
</div>
`;
}).join('');
}

function openModal(id){
const it=gallery.find(x=>x.id===id);if(!it;return;
document.getElementById('modal-img-wrap').innerHTML=`<img src="${it.img}"/>`;
const sev = Object.values(it.severityMap||{})[0]||'Media';
document.getElementById('modal-body').innerHTML=`
<div class="modal-title">${it.detections.map(d=>d.sub).join(' + ')}</div>
<div class="modal-meta">${it.detections.map(d=>`<span class="cat-badge ${TX.find(t=>t.id===d.catId)?.cbCls||'cb-mec'}">${d.name}</span>`).join(' ')} · ${new Date(it.ts).toLocaleString()}</div>
<div class="meta-row">
<div class="mc"><span class="ml">Severidad máxima</span><span class="mv" style="color:${SEV_C[sev]}">● ${sev}</span></div>
<div class="mc"><span class="ml">Confianza</span><span class="mv">${Math.round((it.conf||0.8)*100)}%</span></div>
</div>
<div class="reco" style="border-left-color:${it.detections[0]?.col||'#60a5fa'};margin-bottom:12px">
<b>Recomendación:</b> ${it.reco}
</div>
<button class="btn btn-d btn-full" onclick="deleteItem(${it.id})">🗑 Eliminar registro</button>
`;
document.getElementById('modal-bg').classList.add('open');
}
function closeModal(e){if(!e||e.target.id==='modal-bg')document.getElementById('modal-bg').classList.remove('open');}
function deleteItem(id){
gallery=gallery.filter(x=>x.id!==id);
try{sessionStorage.setItem('patologia_g',JSON.stringify(gallery));}catch(e){}
renderGallery();renderStats();closeModal();
}

/* ─────────── STATS ──────────────────────────────────── */
function renderStats(){
const cats={Mecánica:0,Física:0,Química:0,Biológica:0};
const sevs={Alta:0,Media:0,Baja:0};
gallery.forEach(it=>{
it.detections.forEach(d=>{if(cats[d.name]!==undefined)cats[d.name]++;});
Object.values(it.severityMap||{}).forEach(s=>{if(sevs[s]!==undefined)sevs[s]++;});
});
document.getElementById('srow').innerHTML=`
<div class="sc"><div class="num">${gallery.length}</div><div class="lbl">Total registros</div></div>
<div class="sc"><div class="num">${Object.values(cats).reduce((a,b)=>a+b,0)}</div><div class="lbl">Detecciones</div></div>
`;
const maxCat=Math.max(...Object.values(cats),1);
document.getElementById('chart-cat').innerHTML=Object.entries(cats).map(([k,v])=>`
<div class="bar-r"><div class="bar-l">${k}</div><div class="bar-tr"><div class="bar-f" style="width:${(v/maxCat*100)||0}%;background:${TX.find(t=>t.name===k)?.col||'#60a5fa'}"></div></div><div class="bar-v">${v}</div></div>
`).join('');
const maxSev=Math.max(...Object.values(sevs),1);
const sevCols={Alta:'#ef4444',Media:'#f59e0b',Baja:'#10b981'};
document.getElementById('chart-sev').innerHTML=Object.entries(sevs).map(([k,v])=>`
<div class="bar-r"><div class="bar-l">${k}</div><div class="bar-tr"><div class="bar-f" style="width:${(v/maxSev*100)||0}%;background:${sevCols[k]}"></div></div><div class="bar-v">${v}</div></div>
`).join('');
}

function exportCSV(){
if(!gallery.length)return alert('No hay registros.');
const rows=['ID,Fecha,Categorías,Subpatologías,Severidad,Confianza,Recomendación'];
gallery.forEach(it=>{
const cats=it.detections.map(d=>d.name).join(';');
const subs=it.detections.map(d=>d.sub).join(';');
const sev=Object.entries(it.severityMap||{}).map(([k,v])=>`${k}:${v}`).join(';');
rows.push(`${it.id},${it.ts},${cats},${subs},${sev},${Math.round((it.conf||0)*100)}%,"${(it.reco||'').replace(/"/g,'""')}"`);
});
const blob=new Blob([rows.join('\n')],{type:'text/csv'});
const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='patologias.csv';a.click();
}
function clearAll(){if(!confirm('¿Eliminar todos los registros?'))return;gallery=[];sessionStorage.removeItem('patologia_g');renderGallery();renderStats();}

/* ─────────── UTILS ──────────────────────────────────── */
function tab(id){
document.querySelectorAll('.pnl').forEach(p=>p.classList.remove('on'));
document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
document.getElementById('pnl-'+id).classList.add('on');
event.currentTarget.classList.add('on');
if(id==='stats')renderStats();
}
function sel(id){document.querySelectorAll('.cap-tile').forEach(t=>t.classList.remove('sel'));document.getElementById(id).classList.add('sel');}

/* ─────────── INIT ───────────────────────────────────── */
buildTaxonomy();
renderGallery();
renderStats();
</script>
</body>
</html>
